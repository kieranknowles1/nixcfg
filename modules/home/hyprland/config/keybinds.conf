# Key bindings for Hyprland. Not done in nix as that would require grouping all binds by flags,
# which makes them harder to organize.
# Any binds that need non-standard packages should use variables set in nix.
# See https://wiki.hyprland.org/Configuring/Binds/ and https://wiki.hyprland.org/Configuring/Dispatchers/
# for more information.
# Flags:
# l -> locked, will also work when an input inhibitor (e.g. a lockscreen) is active.
# r -> release, will trigger on release of a key.
# e -> repeat, will repeat when held.
# n -> non-consuming, key/mouse events will be passed to the active window in addition to triggering the dispatcher.
# m -> mouse, see below
# t -> transparent, cannot be shadowed by other binds.
# i -> ignore mods, will ignore modifiers.

$leftMouse = mouse:272
$rightMouse = mouse:273
$middleMouse = mouse:274

# Lets start with the basics, this is standard for most tiling window managers.
# but Hyprland is the IKEA of window managers, so you have to assemble it yourself.
# Open the launcher with left windows key.
bindr = SUPER, SUPER_L, exec, ags -t launcher

# Alt + F4 to close a window
bind = ALT, F4, killactive
# Alt + Tab to switch windows
bind = ALT, Tab, cyclenext
# TODO: This is deprecated in favour of alterzorder, but the docs are unclear on how to use it.
bind = ALT, Tab, bringactivetotop
bind = ALT Shift, Tab, cyclenext, prev
bind = ALT Shift, Tab, bringactivetotop

# Media keys
# TODO: Add a widget on change
# TODO: Get play/pause working somehow

# Volume, changing volume will also unmute
bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = ,XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0
bind = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = ,XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0

bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle


# More advanced binds, these are more specific to my setup.

# Win + Number to move window between workspaces
bind = SUPER, 1, movetoworkspace, 1
bind = SUPER, 2, movetoworkspace, 2
bind = SUPER, 3, movetoworkspace, 3
bind = SUPER, 4, movetoworkspace, 4
bind = SUPER, 5, movetoworkspace, 5
bind = SUPER, 6, movetoworkspace, 6
bind = SUPER, 7, movetoworkspace, 7
bind = SUPER, 8, movetoworkspace, 8
bind = SUPER, 9, movetoworkspace, 9

# Win + left click to move windows
bindm = SUPER, $leftMouse, movewindow
# Win + right click to resize windows
bindm = SUPER, $rightMouse, resizewindow

# Win + T to open a terminal
bind = SUPER, T, exec, kitty

# Win + F to toggle floating a window
bind = SUPER, F, togglefloating
